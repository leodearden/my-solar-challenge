<!-- Toast notification system (Alpine.js store) -->
<script>
document.addEventListener('alpine:init', () => {
    Alpine.store('toast', {
        items: [],
        _nextId: 0,

        add(message, type = 'info', duration = 4000) {
            const id = this._nextId++;
            this.items.push({ id, message, type, visible: true });
            if (duration > 0) {
                setTimeout(() => this.remove(id), duration);
            }
        },

        remove(id) {
            const idx = this.items.findIndex(t => t.id === id);
            if (idx !== -1) {
                this.items[idx].visible = false;
                setTimeout(() => {
                    this.items = this.items.filter(t => t.id !== id);
                }, 300);
            }
        },

        success(message, duration) { this.add(message, 'success', duration); },
        error(message, duration)   { this.add(message, 'error', duration || 6000); },
        info(message, duration)    { this.add(message, 'info', duration); }
    });
});
</script>

<div x-data
     class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"
     aria-live="polite"
>
    <template x-for="toast in $store.toast.items" :key="toast.id">
        <div x-show="toast.visible"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-x-8"
             x-transition:enter-end="opacity-100 translate-x-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-x-0"
             x-transition:leave-end="opacity-0 translate-x-8"
             class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-sm font-medium max-w-sm"
             :class="{
                 'bg-green-50 dark:bg-green-900/80 text-green-800 dark:text-green-200 border border-green-200 dark:border-green-700': toast.type === 'success',
                 'bg-red-50 dark:bg-red-900/80 text-red-800 dark:text-red-200 border border-red-200 dark:border-red-700': toast.type === 'error',
                 'bg-sky-50 dark:bg-sky-900/80 text-sky-800 dark:text-sky-200 border border-sky-200 dark:border-sky-700': toast.type === 'info'
             }"
        >
            <!-- Icon -->
            <svg x-show="toast.type === 'success'" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <svg x-show="toast.type === 'error'" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <svg x-show="toast.type === 'info'" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>

            <span x-text="toast.message" class="flex-1"></span>

            <button @click="$store.toast.remove(toast.id)"
                    class="flex-shrink-0 opacity-60 hover:opacity-100 transition-opacity"
                    aria-label="Dismiss">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </template>
</div>
